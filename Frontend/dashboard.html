<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patitas Felices - Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/style.css" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-vet px-4 py-3">
      <div class="container-fluid">
        <span class="navbar-brand fw-bold">🐾 Patitas Felices 🐾</span>
        <form id="dashboardForm" class="d-flex align-items-center">
          <span id="logged-vet-name" class="me-3 fw-semibold text-primary"
            >Veterinario</span
          >
          <button
            id="logoutButton"
            type="submit"
            class="btn btn-outline-danger btn-sm rounded-pill px-3"
          >
            Salir
          </button>
        </form>
      </div>
    </nav>

    <div class="container dashboard-container">
      <div class="glass-card">
        <div
          class="d-flex justify-content-between align-items-center mb-4 flex-wrap"
        >
          <h3 class="mb-2">Historias Clínicas</h3>
          <button
            class="btn btn-primary btn-premium mb-2"
            data-bs-toggle="modal"
            data-bs-target="#modalMascota"
          >
            + Nueva Historia
          </button>
        </div>

        <div class="table-responsive">
          <table id="tabla-historiales" class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Mascota</th>
                <th>Edad</th>
                <th>Especie</th>
                <th>Dueño</th>
                <th>Telefono</th>
                <th>Fecha</th>
                <th>Detalle</th>
              </tr>
            </thead>
            <tbody id="historialesTable">
              <!-- Records will be injected here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!--Modal botstrap - historia clinica-->
    <div class="modal fade" id="modalMascota" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div
          class="modal-content glass-card p-0"
          style="border: none; backdrop-filter: none"
        >
          <div class="modal-header border-0 p-4">
            <h5 class="modal-title fw-bold">Nueva Historia Clínica</h5>
            <button
              type="button"
              id="closeHistorialButton"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="addHistoryForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nombre Mascota</label>
                  <input
                    type="text"
                    id="mascota"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Especie</label>
                  <input
                    type="text"
                    id="especie"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Edad</label>
                  <input
                    type="text"
                    id="edadMascota"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Nombre Dueño</label>
                  <input
                    type="text"
                    id="nombreDuenio"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Apellido Dueño</label>
                  <input
                    type="text"
                    id="apellidoDuenio"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Telefono</label>
                  <input
                    type="text"
                    id="telefono"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-8">
                  <label class="form-label">Direccion</label>
                  <input
                    type="text"
                    id="direccion"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-12">
                  <label class="form-label">Detalle Historial</label>
                  <textarea
                    id="historial"
                    class="form-control"
                    rows="4"
                    required
                  ></textarea>
                </div>
              </div>
              <div class="mt-4 text-end">
                <button
                  type="button"
                  id="cancelHistorialButton"
                  class="btn btn-secondary me-2"
                  data-bs-dismiss="modal"
                >
                  Cancelar
                </button>

                <button
                  type="button"
                  id="addHistorialButton"
                  class="btn btn-primary btn-premium"
                >
                  Guardar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/js/dashboard.js"></script>
  </body>
</html>
