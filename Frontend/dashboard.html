<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Patitas Felices | Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body class="bg-main text-light">
    <form id="dashboardForm">
      <nav class="navbar navbar-dark bg-secondary px-4">
        <span class="navbar-brand">🐾 Patitas Felices</span>
        <button type="submit" id="logoutButton" class="btn btn-outline-light">
          Salir
        </button>
      </nav>

      <div class="container mt-4">
        <div class="d-flex justify-content-between mb-3">
          <h4>Historial Clinico</h4>
          <button
            class="btn btn-accent"
            data-bs-toggle="modal"
            data-bs-target="#modalMascota"
          >
            + Nuevo Historial Clinico
          </button>
        </div>

        <table class="table table-dark table-hover">
          <thead>
            <tr>
              <th>Mascota</th>
              <th>Dueño</th>
              <th>Veterinario</th>
              <th>Historial</th>
            </tr>
          </thead>
          <tbody id="historialesTable"></tbody>
        </table>
      </div>
    </form>
    <!-- Modal Mascota -->
    <div class="modal fade" id="modalMascota">
      <div class="modal-dialog">
        <div class="modal-content bg-secondary text-light">
          <div class="modal-header">
            <h5>Nueva Historia CLinica</h5>
            <button
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              class="form-control mb-2"
              id="mascota"
              placeholder="Nombre de la mascota"
            />
            <input class="form-control mb-2" id="duenio" placeholder="Dueño" />
            <input
              class="form-control mb-2"
              id="vet"
              placeholder="Veterinario"
            />
            <textarea
              class="form-control"
              id="historial"
              placeholder="Historial clínico"
            ></textarea>
          </div>
          <div class="modal-footer">
            <button id="addHistorialButton" class="btn btn-accent">
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
