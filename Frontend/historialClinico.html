<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listado de Historias Clínicas</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <header>
      <h1>Listado de Historias Clínicas</h1>
    </header>
    <main>
      <section>
        <h2>Mis Historias Clínicas</h2>
        <table id="historialTable">
          <thead>
            <tr>
              <th>Nombre de la Mascota</th>
              <th>Nombre del Dueño</th>
              <th>Nombre del Veterinario</th>
              <th>Detalle de la Historia Clínica</th>
            </tr>
          </thead>
          <tbody id="historialBody">
            <!-- Las filas se cargarán dinámicamente con JavaScript -->
          </tbody>
        </table>
        <button id="crearNuevaBtn">Crear Nueva Historia Clínica</button>
      </section>
    </main>
    <script src="src/js/app.js"></script>
    <script>
      // Función para obtener el token de autenticación
      function getToken() {
        return localStorage.getItem("token"); // Asumiendo que el token se guarda en localStorage
      }

      // Función para cargar el listado de historias clínicas del veterinario logueado
      async function cargarHistoriasClinicas() {
        const token = getToken();
        if (!token) {
          alert("No estás autenticado. Por favor, inicia sesión.");
          window.location.href = "login.html"; // Redirigir a login si no hay token
          return;
        }

        try {
          const response = await fetch("/api/historialClinico/me", {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
          });
          if (!response.ok) {
            throw new Error("Error al cargar las historias clínicas");
          }
          const historias = await response.json();
          const tbody = document.getElementById("historialBody");
          tbody.innerHTML = ""; // Limpiar contenido anterior
          historias.forEach((historia) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${historia.nom_mascota}</td>
                        <td>${historia.nom_duenio} ${historia.ape_duenio}</td>
                        <td>${historia.nom_vete} ${historia.ape_vete}</td>
                        <td>${historia.descripcion}</td>
                    `;
            tbody.appendChild(row);
          });
        } catch (error) {
          console.error("Error:", error);
          alert("No se pudieron cargar las historias clínicas.");
        }
      }

      // Evento para el botón de crear nueva historia clínica
      document.getElementById("crearNuevaBtn").addEventListener("click", () => {
        // Redirigir a un formulario de creación (ajusta la URL según tu aplicación)
        window.location.href = "crear-historia-clinica.html"; // O usa un modal/formulario en la misma página
      });

      // Cargar las historias al cargar la página
      document.addEventListener("DOMContentLoaded", cargarHistoriasClinicas);
    </script>
  </body>
</html>
